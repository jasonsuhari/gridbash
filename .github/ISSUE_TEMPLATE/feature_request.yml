name: Feature request
description: Suggest a focused GridBash improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard, missing, slow, or confusing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want GridBash to support.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or different approaches if you have them.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI controls
        - PTY/process behavior
        - Profiles/configuration
        - npm packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I am willing to help test or implement this.
          required: false
