name: Label Issues

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Existing issue number to classify
        required: true
        type: string

permissions: {}

concurrency:
  group: issue-labeler-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply issue labels
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out trusted classifier
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Classify issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: node npm/scripts/issue-labeler.js
