[defaults]
profile = "git-bash"
# Keeps compilers and other pane workloads from starving interactive desktop apps.
pane_priority = "below-normal"

[manager]
endpoint = "https://api.openai.com/v1/chat/completions"
model = "gpt-4o-mini"
api_key = ""

[todos]
idle_seconds = 90
prompts = [
  "Review the latest changes and summarize anything risky.",
  "Run the fastest relevant validation and report failures.",
]

[auth]
home = "C:\\Users\\Jason\\.gridbash-auth"
auto_cycle = false
usage_status = true

[auth.defaults]
claude = "claude-1"
codex = "codex-2"

[profiles.codex-fast]
command = "codex"
args = ["--model", "gpt-5.4-mini"]
title = "Codex Fast"
agent_kind = "codex"

[profiles.claude-review]
command = "claude"
args = []
title = "Claude Review"
agent_kind = "claude"

[profiles.git-worktree]
command = "bash"
args = ["--login", "-i"]
title = "Git Bash"
