[defaults]
# Set this to a key reported by `gridbash --list-profiles`.
# profile = "git-bash"
# Keeps compilers and other pane workloads from starving interactive desktop apps.
pane_priority = "below-normal"
# Shares CPU fairly under contention while keeping every pane process running.
pane_workload = "adaptive"

[ui]
compact_titles = false
activity_badges = true
confirm_quit = false
scrollback_rows = 10000
refresh_ms = 16

[ui.palette]
accent = "cyan"
focus = "yellow"
selected = "cyan"
quiet = "dark-gray"
exited = "red"

[manager]
activity_summaries = false # opt in: sends bounded active-tab output to this API
endpoint = "https://api.openai.com/v1/chat/completions"
model = "gpt-4o-mini"
api_key = ""

[todos]
idle_seconds = 90
prompts = [
  "Review the latest changes and summarize anything risky.",
  "Run the fastest relevant validation and report failures.",
]

[auth]
# Optional absolute directory for isolated Claude and Codex profiles.
# home = "C:\\Users\\you\\.gridbash-auth"
auto_cycle = false
usage_status = true

[auth.defaults]
claude = "claude-1"
codex = "codex-2"

[profiles.codex-fast]
command = "codex"
args = ["--model", "gpt-5.4-mini"]
title = "Codex Fast"
agent_kind = "codex"

[profiles.claude-review]
command = "claude"
args = []
title = "Claude Review"
agent_kind = "claude"

[profiles.git-worktree]
command = "bash"
args = ["--login", "-i"]
title = "Git Bash"
