[defaults]
profile = "git-bash"

[profiles.codex-fast]
command = "codex"
args = ["--model", "gpt-5.4-mini"]
title = "Codex Fast"

[profiles.claude-review]
command = "claude"
args = []
title = "Claude Review"

[profiles.git-worktree]
command = "bash"
args = ["--login", "-i"]
title = "Git Bash"

[setups.gridbash-swarm]
agents = ["claude-1", "claude-2", "codex-2"]

[[setups.gridbash-swarm.folders]]
name = "gridbash"
path = "C:\\Users\\Jason\\Documents\\GitHub\\gridbash"

[[setups.gridbash-swarm.folders]]
name = "fluent"
path = "C:\\Users\\Jason\\Documents\\GitHub\\fluent"
